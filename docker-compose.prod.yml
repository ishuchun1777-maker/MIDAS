version: '3.9'

# MIDAS — Production Docker Compose
# Ishlatish: docker-compose -f docker-compose.prod.yml up -d

services:
  # ─── PostgreSQL ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: midas_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-midas_db}
      POSTGRES_USER:     ${POSTGRES_USER:-midas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    networks: [midas_net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-midas_user}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  # ─── Redis ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: midas_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [midas_net]
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── API Backend ───────────────────────
  api:
    image: ghcr.io/${GITHUB_OWNER}/midas-api:latest
    container_name: midas_api
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:            ${JWT_SECRET}
      BOT_TOKEN:             ${BOT_TOKEN}
      WEBHOOK_SECRET_TOKEN:  ${WEBHOOK_SECRET_TOKEN}
      MINIAPP_URL:           ${MINIAPP_URL}
      ADMIN_URL:             ${ADMIN_URL}
      OPENAI_API_KEY:        ${OPENAI_API_KEY}
      PAYME_MERCHANT_ID:     ${PAYME_MERCHANT_ID}
      PAYME_SECRET_KEY:      ${PAYME_SECRET_KEY}
      PAYME_TEST_MODE:       'false'
      CLICK_MERCHANT_ID:     ${CLICK_MERCHANT_ID}
      CLICK_SERVICE_ID:      ${CLICK_SERVICE_ID}
      CLICK_SECRET_KEY:      ${CLICK_SECRET_KEY}
      CLICK_TEST_MODE:       'false'
      INTERNAL_SECRET:       ${INTERNAL_SECRET}
      NODE_ENV:              production
      PORT:                  3001
      LOG_LEVEL:             info
    networks: [midas_net]
    expose: ['3001']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: '50m', max-file: '5' }

  # ─── Bot ───────────────────────────────
  bot:
    image: ghcr.io/${GITHUB_OWNER}/midas-bot:latest
    container_name: midas_bot
    restart: always
    depends_on:
      api:   { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      BOT_TOKEN:             ${BOT_TOKEN}
      API_URL:               http://api:3001/api/v1
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379
      WEBHOOK_DOMAIN:        ${WEBHOOK_DOMAIN}
      WEBHOOK_SECRET_TOKEN:  ${WEBHOOK_SECRET_TOKEN}
      MINIAPP_URL:           ${MINIAPP_URL}
      INTERNAL_SECRET:       ${INTERNAL_SECRET}
      NODE_ENV:              production
    networks: [midas_net]
    logging:
      driver: json-file
      options: { max-size: '20m', max-file: '3' }

  # ─── Nginx (Reverse Proxy + SSL) ───────
  nginx:
    image: nginx:alpine
    container_name: midas_nginx
    restart: always
    ports: ['80:80', '443:443']
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - ./apps/miniapp/dist:/var/www/miniapp:ro
      - ./apps/admin/dist:/var/www/admin:ro
    depends_on:
      api: { condition: service_healthy }
    networks: [midas_net]
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  # ─── Certbot (SSL) ─────────────────────
  certbot:
    image: certbot/certbot
    container_name: midas_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── Prometheus (Monitoring) ───────────
  prometheus:
    image: prom/prometheus:latest
    container_name: midas_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks: [midas_net]
    expose: ['9090']

  # ─── Grafana (Dashboards) ──────────────
  grafana:
    image: grafana/grafana:latest
    container_name: midas_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL:         ${GRAFANA_URL}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks: [midas_net]
    expose: ['3000']
    depends_on: [prometheus]

networks:
  midas_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
  prometheus_data:
  grafana_data:
