# MIDAS — CI/CD Pipeline
# .github/workflows/deploy.yml

name: MIDAS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/midas

jobs:
  # ─── 1. Test ──────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: midas_test
          POSTGRES_USER: midas_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    env:
      DATABASE_URL: postgresql://midas_user:test_password@localhost:5432/midas_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_minimum_32_chars_here
      BOT_TOKEN: 0:test_bot_token
      OPENAI_API_KEY: sk-test
      PAYME_MERCHANT_ID: test_merchant
      PAYME_SECRET_KEY: test_secret
      PAYME_TEST_MODE: 'true'
      CLICK_MERCHANT_ID: test_click
      CLICK_SERVICE_ID: test_service
      CLICK_SECRET_KEY: test_click_secret
      CLICK_TEST_MODE: 'true'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd packages/database && npx prisma generate

      - name: Run DB migrations
        run: cd packages/database && npx prisma migrate deploy

      - name: Run unit tests
        run: npx jest --testPathPattern='(unit|layer[0-9]|fraud|shared)' --passWithNoTests

      - name: Run integration tests
        run: npx jest --testPathPattern='api.integration' --passWithNoTests

      - name: Run E2E tests
        run: npx jest --testPathPattern='e2e' --passWithNoTests --runInBand

  # ─── 2. Build ─────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      - name: Build & push Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/bot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-bot:latest
            ${{ env.IMAGE_PREFIX }}-bot:${{ github.sha }}

  # ─── 3. Deploy ────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/midas

            # Yangi imagelarni pull
            docker pull ${{ env.IMAGE_PREFIX }}-api:latest
            docker pull ${{ env.IMAGE_PREFIX }}-bot:latest

            # Zero-downtime restart
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale api=2 api
            sleep 15
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale api=1 api

            # Bot restart
            docker-compose -f docker-compose.prod.yml restart bot

            # DB migratsiyalar
            docker-compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy

            # Eski imagelarni tozalash
            docker image prune -f

            echo "Deploy muvaffaqiyatli yakunlandi: $(date)"

      - name: Notify Telegram (deploy success)
        if: success()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.DEPLOY_NOTIFY_CHAT }}
          token:   ${{ secrets.DEPLOY_BOT_TOKEN }}
          message: |
            ✅ MIDAS deploy muvaffaqiyatli!
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Muallif: ${{ github.actor }}

      - name: Notify Telegram (deploy failed)
        if: failure()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to:      ${{ secrets.DEPLOY_NOTIFY_CHAT }}
          token:   ${{ secrets.DEPLOY_BOT_TOKEN }}
          message: |
            ❌ MIDAS deploy MUVAFFAQIYATSIZ!
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Loglarga qarang: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
