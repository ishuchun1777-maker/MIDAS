# MIDAS — Nginx Virtual Hosts
# nginx/conf.d/midas.conf

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.midas.uz app.midas.uz admin.midas.uz midas.uz www.midas.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── API Backend ──────────────────────────
server {
    listen 443 ssl http2;
    server_name api.midas.uz;

    ssl_certificate     /etc/letsencrypt/live/api.midas.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.midas.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Payme/Click webhooklar uchun alohida limit
    location ~ ^/api/v1/payments/(payme|click) {
        limit_req zone=bot burst=50 nodelay;
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Bot webhook
    location /bot {
        limit_req zone=bot burst=100 nodelay;
        proxy_pass         http://bot:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 10s;
    }

    # Umumiy API
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        proxy_pass http://api:3001;
        access_log off;
    }
}

# ─── Mini App (Telegram WebApp) ───────────
server {
    listen 443 ssl http2;
    server_name app.midas.uz;

    ssl_certificate     /etc/letsencrypt/live/app.midas.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.midas.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /var/www/miniapp;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Telegram WebApp uchun kerakli header
    add_header Content-Security-Policy "default-src 'self' https://telegram.org https://*.telegram.org 'unsafe-inline' 'unsafe-eval' data:;";
}

# ─── Admin Panel ──────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.midas.uz;

    ssl_certificate     /etc/letsencrypt/live/admin.midas.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.midas.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /var/www/admin;
    index index.html;

    # IP whitelist (admin uchun)
    # allow 1.2.3.4;
    # deny all;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}

# ─── Grafana (monitoring) ─────────────────
server {
    listen 443 ssl http2;
    server_name monitoring.midas.uz;

    ssl_certificate     /etc/letsencrypt/live/monitoring.midas.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitoring.midas.uz/privkey.pem;

    # Basic auth
    auth_basic "MIDAS Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
